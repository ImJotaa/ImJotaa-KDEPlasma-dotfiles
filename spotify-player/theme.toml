# spotify-player — tema Neon Grid (paleta: ~/dotfiles/colors.md)
[[themes]]
name = "neon-grid"

[themes.palette]
background = "#0d0221"
foreground = "#dee4ff"
black = "#1a1333"
red = "#ff3864"
green = "#05ffa1"
yellow = "#ffd319"
blue = "#00b3fe"
magenta = "#ff2a6d"
cyan = "#05d9e8"
white = "#dee4ff"
bright_black = "#6f6a8f"
bright_red = "#ff5c8a"
bright_green = "#6dffc2"
bright_yellow = "#ffe66d"
bright_blue = "#55ccff"
bright_magenta = "#ff6e9f"
bright_cyan = "#66eaf5"
bright_white = "#f8f8ff"

[themes.component_style]
block_title = { fg = "Magenta", modifiers = ["Bold"] }
border = { fg = "BrightBlack" }
playback_track = { fg = "Cyan", modifiers = ["Bold"] }
playback_artists = { fg = "Magenta" }
playback_album = { fg = "Blue" }
playback_progress_bar = { bg = "Black", fg = "Magenta" }
current_playing = { fg = "Green", modifiers = ["Bold"] }
selection = { bg = "Black", modifiers = ["Bold"] }
